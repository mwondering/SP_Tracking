    reference_cache_steps:
      joint_vel: [0, 1, 2, 3, 4]
      body_lin_vel_w: [-8, -4, -2, -1, 0, 1, 2, 3, 4, 8, 12, 16, 20]
      body_ang_vel_w: [-8, -4, -2, -1, 0, 1, 2, 3, 4, 8, 12, 16, 20]
