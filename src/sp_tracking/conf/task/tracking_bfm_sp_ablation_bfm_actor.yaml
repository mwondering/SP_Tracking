defaults:
  - tracking_bfm
  - override obs: sp_actor_ablation
  - _self_

# The ablations are BFM tasks first.  Only the SP XML/reference schema and the
# data required to evaluate SP observations are added below.
name: tracking_bfm_sp_ablation_bfm_actor
variant:
  environment_profile: bfm_runtime_sp_xml
  reference_profile: sp_xml_compatibility
  observation_profile: bfm_actor_sp_critic
  reward_profile: old_tracking
  termination_profile: old_tracking
  curriculum_profile: none
  sampling_profile: bfm_multimotion
  agent_profile: bfm_ppo

agent_overrides:
  obs_groups:
    actor: [actor]
    critic: [policy, priv]

# Replace only the articulation/reference schema.  Viewer, randomization,
# action, reward, termination, and all other runtime settings stay inherited
# from tracking_bfm.  The SP XML retains BFM's ``*_foot[1-7]_collision`` geom
# names, so the inherited foot-friction selector remains valid.
robot:
  asset: sp_tracking_g1
  anchor_body_name: pelvis
  motion_type: mujoco
  body_names: ${task.reference_views.combined.body_names}

# BFM terms explicitly select the old torso-anchored view.  SP observations
# consume the primary pelvis view from the same union reference cache.
reference_views:
  old_tracking:
    anchor_body_name: torso_link
    body_names:
      - pelvis
      - left_hip_roll_link
      - left_knee_link
      - left_ankle_roll_link
      - right_hip_roll_link
      - right_knee_link
      - right_ankle_roll_link
      - torso_link
      - left_shoulder_roll_link
      - left_elbow_link
      - left_wrist_yaw_link
      - right_shoulder_roll_link
      - right_elbow_link
      - right_wrist_yaw_link
    termination_body_names:
      - left_ankle_roll_link
      - right_ankle_roll_link
      - left_wrist_yaw_link
      - right_wrist_yaw_link
  sp_tracking:
    anchor_body_name: pelvis
    body_names:
      - pelvis
      - left_hip_yaw_link
      - left_knee_link
      - left_ankle_roll_link
      - right_hip_yaw_link
      - right_knee_link
      - right_ankle_roll_link
      - torso_link
      - head_mimic
      - left_shoulder_yaw_link
      - left_wrist_roll_link
      - left_hand_mimic
      - right_shoulder_yaw_link
      - right_wrist_roll_link
      - right_hand_mimic
  combined:
    body_names:
      - pelvis
      - left_hip_yaw_link
      - left_knee_link
      - left_ankle_roll_link
      - right_hip_yaw_link
      - right_knee_link
      - right_ankle_roll_link
      - torso_link
      - head_mimic
      - left_shoulder_yaw_link
      - left_wrist_roll_link
      - left_hand_mimic
      - right_shoulder_yaw_link
      - right_wrist_roll_link
      - right_hand_mimic
      - left_hip_roll_link
      - right_hip_roll_link
      - left_shoulder_roll_link
      - left_elbow_link
      - left_wrist_yaw_link
      - right_shoulder_roll_link
      - right_elbow_link
      - right_wrist_yaw_link

# The BFM solver values remain inherited.  SP privileged observations require
# the two-foot contact sensor to support a larger match buffer.
sim:
  contact_sensor_maxmatch: 128

command:
  command:
    # Required to interpret MuJoCo-format motion data on the SP articulation.
    fk_from_joint_pos: true
    recompute_joint_vel_from_joint_pos: true
    motion_origin_recenter: true
    # Reference-only contact state used by target_feet_contact_state_obs.
    feet_standing_body_names: [left_ankle_roll_link, right_ankle_roll_link]
    feet_standing:
      z_enter: 0.18
      z_exit: 0.25
      vxy_enter: 0.2
      vxy_exit: 0.3
      vz_enter: 0.15
      vz_exit: 0.25
    # Additional history required by SP policy/privileged observation terms.
    reference_cache_steps:
      joint_pos: [-16, -12, -8, -4, -2, -1, 0, 1, 2, 3, 4, 5, 6, 8, 12, 16, 20]
      joint_vel: [0]
      body_pos_w: [-16, -12, -8, -4, -2, -1, 0, 1, 2, 3, 4, 5, 6, 8, 12, 16, 20]
      body_quat_w: [-16, -12, -8, -4, -2, -1, 0, 1, 2, 3, 4, 5, 6, 8, 12, 16, 20]
      body_lin_vel_w: [-8, -4, -2, -1, 0, 1, 2, 4, 8, 12, 16, 20]
      body_ang_vel_w: [-8, -4, -2, -1, 0, 1, 2, 4, 8, 12, 16, 20]

# Preserve the standard BFM action dynamics while recording the policy means
# required by HEFT's eight-step prev_actions observation.
action:
  type: joint_position_with_mean_history
  observation_history_steps: 8

# Observation-only physics-substep sampling.  No BFM reward consumes this
# cache, so enabling it does not change the BFM optimization objective.
metrics:
  substep_tracking_cache:
    term: substep_tracking_cache
    params: {sensor_name: contact_forces}
    per_substep: true
    reduce: last
