defaults:
  - tracking_bfm_sp_ablation_bfm_actor
  - _self_

name: tracking_bfm_sp_ablation_teacher_actor
variant:
  observation_profile: sp_teacher_actor_sp_critic

agent_overrides:
  obs_groups:
    actor: [policy, priv]
    critic: [policy, priv]
  # Match the BFM actor's ~8.62M trainable MLP parameters despite the wider
  # raw teacher observation by adjusting only the input-facing hidden layer.
  actor:
    hidden_dims: [571, 2048, 1024, 1024, 512, 256, 128]
