  - override obs: spv2_heft_critic
  - _self_

name: tracking_bfm_spv2_actor_heft_critic_heft_reward
variant:
  observation_profile: spv2_1056_actor_heft_critic

# SPV2 actor uses five-frame proprioception and current-through-+4 references.
# Keep the wider HEFT policy/privileged groups unchanged for the critic.
command:
