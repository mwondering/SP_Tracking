defaults:
  - tracking_bfm_sp_bfm_runtime
  - override reward: sp_tracking
  - _self_

# SP XML/reference plus SP rewards only.  Observations, BFM PPO/action,
# terminations, curriculum, events, and sampling all come from the BFM runtime
# base so this isolates the reward module.
name: tracking_bfm_sp_bfm_agent_old_obs
variant:
  environment_profile: sp_tracking
  reference_profile: sp_tracking
  observation_profile: old_tracking
  reward_profile: sp_tracking
  termination_profile: old_tracking
  curriculum_profile: none
  sampling_profile: bfm_multimotion
  agent_profile: bfm_ppo

# These are reward-side SP reference features.  The sampler itself remains the
# BFM multi-motion sampler configured by ``tracking_bfm_sp_bfm_runtime``.
command:
  command:
    sliding_root_xy_reward: true
    feet_standing_body_names: [left_ankle_roll_link, right_ankle_roll_link]
    feet_standing:
      z_enter: 0.18
      z_exit: 0.25
      vxy_enter: 0.2
      vxy_exit: 0.3
      vz_enter: 0.15
      vz_exit: 0.25
