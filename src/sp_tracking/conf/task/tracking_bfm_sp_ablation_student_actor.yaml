defaults:
  - tracking_bfm_sp_ablation_bfm_actor
  - _self_

name: tracking_bfm_sp_ablation_student_actor
variant:
  observation_profile: sp_student_actor_sp_critic

agent_overrides:
  obs_groups:
    actor: [policy]
    critic: [policy, priv]
  # Match the BFM actor's ~8.62M trainable MLP parameters despite the wider
  # raw student observation by adjusting only the input-facing hidden layer.
  actor:
    hidden_dims: [1266, 2048, 1024, 1024, 512, 256, 128]
