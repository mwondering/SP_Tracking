defaults:
  - tracking_bfm_spv3_actor_heft_critic_heft_reward
  - override obs: spv4_heft_critic
  - _self_

name: tracking_bfm_spv4_actor_heft_critic_heft_reward
variant:
  observation_profile: spv4_privileged_key_body_actor_heft_critic

# SPV4 deliberately reads simulator body state for its current 13 HEFT
# semantic key bodies.  It is a privileged training variant, not a directly
# deployable sim-to-real actor.
agent_overrides:
  obs_groups:
    actor:
      - actor_core
      - estimator_history
      - robot_key_body
      - ref_key_body
      - key_body_error
    critic: [policy, priv]
  actor:
    class_name: sp_tracking.tasks.tracking.rl.spv4_models:SPV4KeyBodyActor
    robot_key_body_group: robot_key_body
    ref_key_body_group: ref_key_body
    key_body_error_group: key_body_error
