defaults:
  - tracking_bfm
  - _self_

name: tracking_bfm_wbteleop_actor_bfm_critic
variant:
  observation_profile: wbteleop_886_actor_bfm_critic

# Reproduce the deployable 886-D WBTeleop student input from the source
# tracking_bfm checkpoint.  Reference/current limb poses and proprioception use
# five-frame histories; no base linear velocity or global tracking error enters
# the actor.  The command remains at history=0/future=1 (29 q + 29 qdot).
obs:
  observations:
    actor:
      concatenate_terms: true
      enable_corruption: true
      terms:
        - name: command
          term: generated_commands
          params: {command_name: motion}
        - name: ref_limb_ee_pose_b
          term: ref_limb_ee_pose_b
          params:
            command_name: motion
            body_names:
              - left_wrist_yaw_link
              - right_wrist_yaw_link
              - left_ankle_roll_link
              - right_ankle_roll_link
            anchor_body_name: pelvis
            history_steps: 0
            future_steps: 1
          history_length: 5
        - name: motion_ref_ang_vel
          term: motion_ref_ang_vel
          params: {command_name: motion}
          noise: [-0.05, 0.05]
        - name: robot_limb_ee_pose_b
          term: robot_limb_ee_pose_b
          params:
            command_name: motion
            body_names:
              - left_wrist_yaw_link
              - right_wrist_yaw_link
              - left_ankle_roll_link
              - right_ankle_roll_link
            anchor_body_name: pelvis
          history_length: 5
        - name: projected_gravity
          term: projected_gravity
          noise: [-0.05, 0.05]
          history_length: 5
        - name: base_ang_vel
          term: builtin_sensor
          params: {sensor_name: robot/imu_ang_vel}
          noise: [-0.2, 0.2]
          history_length: 5
        - name: joint_pos
          term: joint_pos_rel
          params: {biased: true}
          noise: [-0.01, 0.01]
          history_length: 5
        - name: joint_vel
          term: joint_vel_rel
          noise: [-0.5, 0.5]
          history_length: 5
        - name: actions
          term: last_action
          history_length: 5

agent_overrides:
  obs_groups:
    actor: [actor]
    critic: [critic]
