observations:
  actor:
    concatenate_terms: true
    enable_corruption: true
    terms:
      - {name: boot_indicator_state_obs, term: boot_indicator_state_obs}
      - {name: command_obs, term: command_obs, params: {command_name: motion, horizon: student}}
      - {name: target_joint_pos_obs, term: target_joint_pos_obs, params: {command_name: motion, horizon: student}}
      - {name: target_root_z_obs, term: target_root_z_obs, params: {command_name: motion, horizon: student}}
      - {name: target_projected_gravity_b_obs, term: target_projected_gravity_b_obs, params: {command_name: motion, horizon: student}}
      - {name: root_angvel_b_history, term: root_angvel_b_history, params: {history_steps: [0, 1, 2, 3, 4, 8, 12, 16, 20]}}
      - {name: projected_gravity_history, term: projected_gravity_history, params: {history_steps: [0, 1, 2, 3, 4, 8, 12, 16, 20]}}
      - {name: joint_pos_history, term: joint_pos_history, params: {history_steps: [0, 1, 2, 3, 4, 8, 12, 16, 20]}}
      - {name: joint_vel_history, term: joint_vel_history, params: {history_steps: [0, 1, 2, 3, 4, 8, 12, 16, 20]}}
      - {name: prev_actions, term: prev_actions, params: {steps: 8}}
  critic:
    concatenate_terms: true
    enable_corruption: false
    terms:
      - {name: target_joint_pos_obs, term: target_joint_pos_obs, params: {command_name: motion, horizon: teacher}}
      - {name: target_root_z_obs, term: target_root_z_obs, params: {command_name: motion, horizon: teacher}}
      - {name: target_projected_gravity_b_obs, term: target_projected_gravity_b_obs, params: {command_name: motion, horizon: teacher}}
      - {name: target_pos_b_obs, term: target_pos_b_obs, params: {command_name: motion}}
      - {name: target_rot_b_obs, term: target_rot_b_obs, params: {command_name: motion}}
      - {name: target_linvel_b_obs, term: target_linvel_b_obs, params: {command_name: motion}}
      - {name: target_angvel_b_obs, term: target_angvel_b_obs, params: {command_name: motion}}
      - {name: current_keypoint_pos_b_obs, term: current_keypoint_pos_b_obs}
      - {name: current_keypoint_rot_b_obs, term: current_keypoint_rot_b_obs}
      - {name: current_keypoint_linvel_b_obs, term: current_keypoint_linvel_b_obs}
      - {name: current_keypoint_angvel_b_obs, term: current_keypoint_angvel_b_obs}
      - {name: target_keypoints_pos_b_obs, term: target_keypoints_pos_b_obs, params: {command_name: motion, required_steps: 12, include_diff: true}}
      - {name: target_keypoints_rot_b_obs, term: target_keypoints_rot_b_obs, params: {command_name: motion, required_steps: 12, include_diff: true}}
      - {name: root_linvel_b_history, term: root_linvel_b_history, params: {history_steps: [0, 1, 2, 3, 4, 5, 6, 7, 8]}}
      - {name: root_angvel_b_history, term: root_angvel_b_history, params: {history_steps: [0, 1, 2, 3, 4, 5, 6, 7, 8]}}
      - {name: projected_gravity_history, term: projected_gravity_history, params: {history_steps: [0, 1, 2, 3, 4, 5, 6, 7, 8]}}
      - {name: joint_pos_history, term: joint_pos_history, params: {history_steps: [0, 1, 2, 3, 4, 5, 6, 7, 8]}}
      - {name: joint_vel_history, term: joint_vel_history, params: {history_steps: [0, 1, 2, 3, 4, 5, 6, 7, 8]}}
      - {name: applied_action, term: applied_action}
      - {name: applied_torque, term: applied_torque}
      - {name: body_z_termination_obs, term: body_z_termination_obs, params: {command_name: motion}}
      - {name: gravity_dir_termination_obs, term: gravity_dir_termination_obs, params: {command_name: motion}}
      - {name: feet_contact_state, term: feet_contact_state, params: {sensor_name: contact_forces}}
      - {name: target_feet_contact_state_obs, term: target_feet_contact_state_obs, params: {command_name: motion}}
      - {name: domain_motor_params_implicit, term: domain_motor_params_implicit}
      - {name: domain_perturb_body_materials, term: domain_perturb_body_materials}
      - {name: domain_random_joint_offset, term: domain_random_joint_offset}
      - {name: domain_perturb_gravity, term: domain_perturb_gravity}
