defaults:
  - tracking_bfm
  - override obs: sp_actor_ablation
  - _self_

# The ablations are BFM tasks first.  HEFT observations are expressed through
# semantic keypoints backed by BFM physical bodies and fixed local offsets.
name: tracking_bfm_sp_ablation_bfm_actor
variant:
  environment_profile: bfm_runtime_semantic_keypoints
  reference_profile: bfm_physical_heft_semantics
  observation_profile: bfm_actor_sp_critic
  reward_profile: old_tracking
  termination_profile: old_tracking
  curriculum_profile: none
  sampling_profile: bfm_multimotion
  agent_profile: bfm_ppo

agent_overrides:
  obs_groups:
    actor: [actor]
    critic: [policy, priv]
  critic:
    class_name: sp_tracking.tasks.tracking.rl.heft_models:HeftTeacherCritic
    hidden_dims: [1024, 512, 512]
    activation: mish
    obs_normalization: true
    vecnorm_decay: 0.9999

# Keep BFM's XML, articulation, anchor, motion format, reset, collision and
# dynamics.  The command caches a union of physical bodies only.
robot:
  asset: tracking_bfm_g1
  body_names: ${task.reference_views.combined.body_names}
  # HEFT observation tensor order only; MuJoCo/XML and the BFM action dynamics
  # remain unchanged.
  joint_name_order:
    - left_hip_pitch_joint
    - right_hip_pitch_joint
    - waist_yaw_joint
    - left_hip_roll_joint
    - right_hip_roll_joint
    - waist_roll_joint
    - left_hip_yaw_joint
    - right_hip_yaw_joint
    - waist_pitch_joint
    - left_knee_joint
    - right_knee_joint
    - left_shoulder_pitch_joint
    - right_shoulder_pitch_joint
    - left_ankle_pitch_joint
    - right_ankle_pitch_joint
    - left_shoulder_roll_joint
    - right_shoulder_roll_joint
    - left_ankle_roll_joint
    - right_ankle_roll_joint
    - left_shoulder_yaw_joint
    - right_shoulder_yaw_joint
    - left_elbow_joint
    - right_elbow_joint
    - left_wrist_roll_joint
    - right_wrist_roll_joint
    - left_wrist_pitch_joint
    - right_wrist_pitch_joint
    - left_wrist_yaw_joint
    - right_wrist_yaw_joint

obs:
  semantic_keypoints:
    heft:
      - {name: left_hip, body_name: left_hip_yaw_link}
      - {name: left_knee, body_name: left_knee_link}
      - {name: left_foot, body_name: left_ankle_roll_link}
      - {name: right_hip, body_name: right_hip_yaw_link}
      - {name: right_knee, body_name: right_knee_link}
      - {name: right_foot, body_name: right_ankle_roll_link}
      - {name: head, body_name: torso_link, local_pos: [0.01, 0.0, 0.41]}
      - {name: left_shoulder, body_name: left_shoulder_yaw_link}
      - {name: left_wrist, body_name: left_wrist_roll_link}
      - {name: left_hand, body_name: left_wrist_yaw_link, local_pos: [0.116, 0.0, 0.0]}
      - {name: right_shoulder, body_name: right_shoulder_yaw_link}
      - {name: right_wrist, body_name: right_wrist_roll_link}
      - {name: right_hand, body_name: right_wrist_yaw_link, local_pos: [0.116, 0.0, 0.0]}

# Every reward and observation view uses the pelvis anchor. HEFT semantic
# points continue to resolve from their physical parent bodies.
reference_views:
  old_tracking:
    anchor_body_name: pelvis
    body_names:
      - pelvis
      - left_hip_roll_link
      - left_knee_link
      - left_ankle_roll_link
      - right_hip_roll_link
      - right_knee_link
      - right_ankle_roll_link
      - torso_link
      - left_shoulder_roll_link
      - left_elbow_link
      - left_wrist_yaw_link
      - right_shoulder_roll_link
      - right_elbow_link
      - right_wrist_yaw_link
    termination_body_names:
      - left_ankle_roll_link
      - right_ankle_roll_link
      - left_wrist_yaw_link
      - right_wrist_yaw_link
  sp_tracking:
    anchor_body_name: pelvis
    body_names:
      - pelvis
      - left_hip_yaw_link
      - left_knee_link
      - left_ankle_roll_link
      - right_hip_yaw_link
      - right_knee_link
      - right_ankle_roll_link
      - torso_link
      - left_shoulder_yaw_link
      - left_wrist_roll_link
      - left_wrist_yaw_link
      - right_shoulder_yaw_link
      - right_wrist_roll_link
      - right_wrist_yaw_link
  combined:
    body_names:
      - pelvis
      - left_hip_yaw_link
      - left_knee_link
      - left_ankle_roll_link
      - right_hip_yaw_link
      - right_knee_link
      - right_ankle_roll_link
      - torso_link
      - left_shoulder_yaw_link
      - left_wrist_roll_link
      - left_wrist_yaw_link
      - right_shoulder_yaw_link
      - right_wrist_roll_link
      - right_wrist_yaw_link
      - left_hip_roll_link
      - right_hip_roll_link
      - left_shoulder_roll_link
      - left_elbow_link
      - right_shoulder_roll_link
      - right_elbow_link

command:
  command:
    # Preserve the raw BFM body/joint trajectories. Semantic keypoints are
    # fixed transforms of these cached physical body frames, never joint FK.
    fk_from_joint_pos: false
    recompute_joint_vel_from_joint_pos: false
    motion_origin_recenter: false
    # Reference-only contact state used by target_feet_contact_state_obs.
    feet_standing_body_names: [left_ankle_roll_link, right_ankle_roll_link]
    feet_standing:
      z_enter: 0.18
      z_exit: 0.25
      vxy_enter: 0.2
      vxy_exit: 0.3
      vz_enter: 0.15
      vz_exit: 0.25
    # Additional history required by SP policy/privileged observation terms.
    reference_cache_steps:
      joint_pos: [-16, -12, -8, -4, -2, -1, 0, 1, 2, 3, 4, 5, 6, 8, 12, 16, 20]
      joint_vel: [0]
      body_pos_w: [-16, -12, -8, -4, -2, -1, 0, 1, 2, 3, 4, 5, 6, 8, 12, 16, 20]
      body_quat_w: [-16, -12, -8, -4, -2, -1, 0, 1, 2, 3, 4, 5, 6, 8, 12, 16, 20]
      body_lin_vel_w: [-8, -4, -2, -1, 0, 1, 2, 4, 8, 12, 16, 20]
      body_ang_vel_w: [-8, -4, -2, -1, 0, 1, 2, 4, 8, 12, 16, 20]

# Preserve the standard BFM action dynamics while recording the policy means
# required by HEFT's eight-step prev_actions observation.
action:
  type: joint_position_with_mean_history
  observation_history_steps: 8

# Observation-only physics-substep sampling.  No BFM reward consumes this
# cache, so enabling it does not change the BFM optimization objective.
metrics:
  substep_tracking_cache:
    term: substep_tracking_cache
    params: {sensor_name: contact_forces}
    per_substep: true
    reduce: last
