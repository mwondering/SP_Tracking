command:
  type: multi
  entity_name: robot
  motion_path: ""
  motion_file: ""
  extra_reference_motion_file: ""
  motion_type: isaaclab
  anchor_body_name: ${task.robot.anchor_body_name}
  body_names: ${task.robot.body_names}
  resampling_time_range: [1000000000.0, 1000000000.0]
  debug_vis: true
  pose_range:
    x: [-0.05, 0.05]
    y: [-0.05, 0.05]
    z: [-0.01, 0.01]
    roll: [-0.1, 0.1]
    pitch: [-0.1, 0.1]
    yaw: [-0.2, 0.2]
  velocity_range:
    x: [-0.5, 0.5]
    y: [-0.5, 0.5]
    z: [-0.2, 0.2]
    roll: [-0.52, 0.52]
    pitch: [-0.52, 0.52]
    yaw: [-0.78, 0.78]
  joint_position_range: [-0.1, 0.1]
  future_steps: 5
  history_steps: 5
  sampling_mode: adaptive
