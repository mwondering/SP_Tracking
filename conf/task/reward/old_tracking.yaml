rewards:
  - name: motion_global_root_pos
    term: motion_global_anchor_position_error_exp
    weight: 1.0
    params: {command_name: motion, std: 0.3}
  - name: motion_global_root_ori
    term: motion_global_anchor_orientation_error_exp
    weight: 1.0
    params: {command_name: motion, std: 0.4}
  - name: motion_body_pos
    term: motion_relative_body_position_error_exp
    weight: 1.0
    params: {command_name: motion, std: 0.3}
  - name: motion_body_ori
    term: motion_relative_body_orientation_error_exp
    weight: 1.0
    params: {command_name: motion, std: 0.4}
  - name: motion_body_lin_vel
    term: motion_global_body_linear_velocity_error_exp
    weight: 1.0
    params: {command_name: motion, std: 1.0}
  - name: motion_body_ang_vel
    term: motion_global_body_angular_velocity_error_exp
    weight: 1.0
    params: {command_name: motion, std: 3.14}
  - name: action_rate_l2
    term: action_rate_l2
    weight: -0.1
  - name: waist_action_rate_l2
    term: joint_action_rate_l2
    weight: -0.5
    params:
      action_name: joint_pos
      asset_cfg:
        entity_name: robot
        joint_names:
          - waist_yaw_joint
          - waist_roll_joint
          - waist_pitch_joint
  - name: joint_limit
    term: joint_pos_limits
    weight: -10.0
    params:
      asset_cfg:
        entity_name: robot
        joint_names: [".*"]
  - name: self_collisions
    term: self_collision_cost
    weight: -10.0
    params:
      sensor_name: self_collision
      force_threshold: 10.0
