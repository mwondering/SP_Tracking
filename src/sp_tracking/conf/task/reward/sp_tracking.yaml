rewards:
  - {name: root_pos_tracking, term: root_pos_tracking, weight: 0.5, params: {command_name: motion, sigma: [0.3]}}
  - {name: root_rot_tracking, term: root_rot_tracking, weight: 0.5, params: {command_name: motion, sigma: [0.4]}}
  - {name: root_vel_tracking, term: root_vel_tracking, weight: 1.0, params: {command_name: motion, sigma: [1.0]}}
  - {name: root_ang_vel_tracking, term: root_ang_vel_tracking, weight: 1.0, params: {command_name: motion, sigma: [3.0]}}
  - {name: keypoint_pos_tracking, term: keypoint_pos_tracking, weight: 2.0, params: {command_name: motion, sigma: [0.3]}}
  - {name: keypoint_vel_tracking, term: keypoint_vel_tracking, weight: 1.0, params: {command_name: motion, sigma: [1.0]}}
  - {name: keypoint_rot_tracking, term: keypoint_rot_tracking, weight: 2.0, params: {command_name: motion, sigma: [0.4]}}
  - {name: keypoint_angvel_tracking, term: keypoint_angvel_tracking, weight: 1.0, params: {command_name: motion, sigma: [3.0]}}
  - {name: joint_pos_tracking, term: joint_pos_tracking, weight: 1.0, params: {command_name: motion, sigma: [0.5]}}
  - {name: joint_vel_tracking, term: joint_vel_tracking, weight: 0.5, params: {command_name: motion, sigma: [3.0]}}
  # Source pretrain starts the complete loco group at factor 0.5.
  - {name: survival, term: survival, weight: 1.5}
  - {name: joint_vel_l2, term: joint_vel_l2, weight: 0.00025}
  - {name: action_rate_l2, term: action_rate_l2_sp, weight: 0.01}
  - {name: feet_air_time_ref, term: feet_air_time_ref, weight: 2.5, params: {command_name: motion, sensor_name: contact_forces, thres: 0.5}}
  - {name: feet_air_time_ref_dense, term: feet_air_time_ref_dense, weight: 0.5, params: {command_name: motion, sensor_name: contact_forces, air_h_low: 0.035, air_h_high: 0.155, contact_h_low: 0.035, contact_h_high: 0.125}}
  - {name: joint_pos_limits, term: joint_pos_limits_sp, weight: 0.5, params: {joint_names: ".*", soft_factor: 0.9}}
  - {name: joint_torque_limits, term: joint_torque_limits, weight: 0.005, params: {joint_names: ".*", soft_factor: 0.75}}
  # Source pretrain: scale the complete loco group linearly from 0.5 to 1.0.
  # This zero-valued scheduler updates the listed RewardManager weights.
  - name: loco_reward_group_schedule
    term: loco_reward_group_schedule
    weight: 1.0
    params:
      term_names: [survival, joint_vel_l2, action_rate_l2, feet_air_time_ref, feet_air_time_ref_dense, joint_pos_limits, joint_torque_limits]
      base_weights:
        survival: 3.0
        joint_vel_l2: 0.0005
        action_rate_l2: 0.02
        feet_air_time_ref: 5.0
        feet_air_time_ref_dense: 1.0
        joint_pos_limits: 1.0
        joint_torque_limits: 0.01
      progress_range: [0.0, 1.0]
      factor_range: [0.5, 1.0]
