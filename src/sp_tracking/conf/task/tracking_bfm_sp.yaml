defaults:
  - command: largedataset
  - obs: sp_tracking
  - reward: sp_tracking
  - override /agent@_global_.agent: tracking_bfm_sp_ppo
  - _self_

name: tracking_bfm_sp
debug_nonfinite_state: false
num_envs: 8192
episode_length_s: 20.0
decimation: 4
seed: 42
student_train: true

robot:
  name: g1
  mass: 33.341142
  asset: motion_tracking_g1
  entity_name: robot
  anchor_body_name: pelvis
  viewer_body_name: pelvis
  motion_type: mujoco
  self_collision_primary_pattern: pelvis
  foot_geom_pattern: ^(left|right)_ankle_roll_link$
  base_com_body_names: [pelvis]
  body_names:
    - pelvis
    - left_hip_yaw_link
    - left_knee_link
    - left_ankle_roll_link
    - right_hip_yaw_link
    - right_knee_link
    - right_ankle_roll_link
    - torso_link
    - head_mimic
    - left_shoulder_yaw_link
    - left_wrist_roll_link
    - left_hand_mimic
    - right_shoulder_yaw_link
    - right_wrist_roll_link
    - right_hand_mimic

scene:
  terrain_type: plane
  env_spacing: 2.0

sim:
  timestep: 0.005
  iterations: 10
  ls_iterations: 20
  nconmax: 200
  njmax: 2048
  contact_sensor_maxmatch: 128

viewer:
  distance: 2.8
  fovy: 55.0
  elevation: -5.0
  azimuth: 120.0

command:
  command:
    fk_from_joint_pos: true
    motion_origin_recenter: true
    sliding_root_xy_reward: true
    boot_indicator_max: 25
    termination_warmup_steps: 5
    feet_standing_body_names: [left_ankle_roll_link, right_ankle_roll_link]
    feet_standing:
      z_enter: 0.18
      z_exit: 0.25
      vxy_enter: 0.2
      vxy_exit: 0.3
      vz_enter: 0.15
      vz_exit: 0.25
    # A motion end is a truncation for SP; it is handled by reset sampling
    # instead of silently switching references inside an episode.
    resample_on_motion_end: false
    adaptive_sampling:
      strategy: branch
      random_probability: 0.4
    rewind:
      enabled: true
      failure_probability: 0.4
    # Temporary stability ablation: reset directly onto the reference state.
    # Keep the deterministic clearance lift below, but remove all sampled pose,
    # velocity, and joint-position offsets while diagnosing physics NaNs.
    pose_range:
      x: [0.0, 0.0]
      y: [0.0, 0.0]
      z: [0.0, 0.0]
      roll: [0.0, 0.0]
      pitch: [0.0, 0.0]
      yaw: [0.0, 0.0]
    velocity_range:
      x: [0.0, 0.0]
      y: [0.0, 0.0]
      z: [0.0, 0.0]
      roll: [0.0, 0.0]
      pitch: [0.0, 0.0]
      yaw: [0.0, 0.0]
    joint_position_range: [0.0, 0.0]
    reset_root_lift_height: 0.04
    reset_min_body_z: 0.0
    reset_joint_vel_limit: 10.0
    reference_cache_steps:
      joint_pos: [-16, -12, -8, -4, -2, -1, 0, 1, 2, 3, 4, 5, 6, 8, 12, 16, 20]
      joint_vel: [0]
      body_pos_w: [-16, -12, -8, -4, -2, -1, 0, 1, 2, 3, 4, 5, 6, 8, 12, 16, 20]
      body_quat_w: [-16, -12, -8, -4, -2, -1, 0, 1, 2, 3, 4, 5, 6, 8, 12, 16, 20]
      body_lin_vel_w: [-8, -4, -2, -1, 0, 1, 2, 4, 8, 12, 16, 20]
      body_ang_vel_w: [-8, -4, -2, -1, 0, 1, 2, 4, 8, 12, 16, 20]

action:
  type: motion_tracking
  scale:
    ".*_elbow_joint": 1.0
    ".*_shoulder_pitch_joint": 1.0
    ".*_shoulder_roll_joint": 1.0
    ".*_shoulder_yaw_joint": 1.0
    ".*_wrist_roll_joint": 1.0
    ".*_wrist_pitch_joint": 1.0
    ".*_wrist_yaw_joint": 1.0
    ".*_hip_pitch_joint": 0.5
    ".*_hip_roll_joint": 0.5
    ".*_hip_yaw_joint": 0.5
    ".*_knee_joint": 0.5
    "waist_yaw_joint": 0.5
    "waist_roll_joint": 0.5
    "waist_pitch_joint": 0.5
    ".*_ankle_pitch_joint": 0.5
    ".*_ankle_roll_joint": 0.5
  use_default_offset: true
  actuator_names: [".*"]
  max_delay: 2
  delay_full_progress: 0.8
  alpha: [0.8, 1.0]
  torque_limit_scale_range: [4.0, 1.0]
  torque_limit_progress_range: [0.0, 0.8]
  raw_action_clip: 10.0
  boot_delay_steps: 2
  curriculum_mode: full
  prev_action_obs: mean
  action_rate_source: sampled
  joint_name_order:
    - left_hip_pitch_joint
    - right_hip_pitch_joint
    - waist_yaw_joint
    - left_hip_roll_joint
    - right_hip_roll_joint
    - waist_roll_joint
    - left_hip_yaw_joint
    - right_hip_yaw_joint
    - waist_pitch_joint
    - left_knee_joint
    - right_knee_joint
    - left_shoulder_pitch_joint
    - right_shoulder_pitch_joint
    - left_ankle_pitch_joint
    - right_ankle_pitch_joint
    - left_shoulder_roll_joint
    - right_shoulder_roll_joint
    - left_ankle_roll_joint
    - right_ankle_roll_joint
    - left_shoulder_yaw_joint
    - right_shoulder_yaw_joint
    - left_elbow_joint
    - right_elbow_joint
    - left_wrist_roll_joint
    - right_wrist_roll_joint
    - left_wrist_pitch_joint
    - right_wrist_pitch_joint
    - left_wrist_yaw_joint
    - right_wrist_yaw_joint

events:
  push_robot:
    enabled: false
  base_com:
    enabled: false
  base_mass:
    enabled: false
  encoder_bias:
    enabled: false
  foot_friction:
    enabled: false
  perturb_body_com:
    enabled: true
    term: perturb_body_com
    mode: startup
    params:
      body_names:
        - pelvis
        - torso_link
      com_range: [-0.03, 0.03]
  perturb_body_materials:
    enabled: true
    term: perturb_body_materials
    mode: startup
    params:
      body_names: ".*"
      static_friction_range: [0.5, 1.2]
      solref_time_constant_range: [0.015, 0.03]
      solref_dampratio_range: [0.8, 1.2]
      homogeneous: true
  motor_params_implicit:
    enabled: true
    term: motor_params_implicit
    mode: startup
    params:
      mode: uniform
      stiffness_range:
        ".*(shoulder|elbow|wrist).*": [0.9, 1.1]
        ".*(waist|hip|knee|ankle).*": [0.8, 1.2]
      damping_range:
        ".*(shoulder|elbow|wrist).*": [0.9, 1.1]
        ".*(waist|hip|knee|ankle).*": [0.8, 1.2]
      armature_range:
        ".*": [0.8, 1.2]
  random_joint_offset:
    enabled: true
    term: random_joint_offset
    mode: reset
    params:
      ranges:
        ".*": [-0.01, 0.01]
  perturb_root_vel:
    enabled: true
    term: perturb_root_vel
    mode: step
    params:
      min_s: 3.0
      max_s: 6.0
      x: [-0.5, 0.5]
      y: [-0.5, 0.5]
      z: [-0.2, 0.2]
      roll: [-0.52, 0.52]
      pitch: [-0.52, 0.52]
      yaw: [-0.78, 0.78]
  perturb_body_wrench:
    enabled: true
    term: perturb_body_wrench
    mode: step
    params:
      body_name: torso_link
      total_duration_range_s: [3.0, 6.0]
      active_duration_range_s: [1.0, 4.0]
      force_magnitude_range_n: [0.0, 10.0]
      lever_arm_length_range_m: [0.0, 0.4]
  perturb_gravity:
    enabled: true
    term: perturb_gravity
    mode: startup
    params:
      mean: [0.0, 0.0, -9.81]
      std: 0.1

curriculum:
  motion_tracking_progress:
    enabled: true
    term: motion_tracking_progress

# The source task samples contacts and uncorrupted joint state at every
# physics substep.  This opt-in cache is also reusable by other task presets.
metrics:
  substep_tracking_cache:
    term: substep_tracking_cache
    per_substep: true
    reduce: last

terminations:
  - name: time_out
    term: time_out
    time_out: true
  - name: motion_timeout
    term: motion_timeout
    time_out: true
    params:
      command_name: motion
  - name: motion_xy_range_termination
    term: motion_xy_range_termination
    time_out: true
    params:
      command_name: motion
      motion_xy_max_offset: 15.0
  - name: body_z_termination
    term: body_z_termination
    params:
      command_name: motion
      body_z_terminate_thres: [-0.25, 0.35]
      body_z_terminate_patterns:
        - pelvis
        - head_mimic
        - .*_hand_mimic
        - .*ankle_roll_link
  - name: gravity_dir_termination
    term: gravity_dir_termination
    params:
      command_name: motion
      gravity_terminate_thres: 1.0
