defaults:
  - tracking_bfm_sp
  - override reward: old_tracking
  - override /agent@_global_.agent: tracking_bfm_ppo
  - _self_

# SP observations with the BFM network/PPO.  The environment remains SP so
# the policy sees the real SP XML and reference schema, rather than an adapter.
name: tracking_bfm_sp_bfm_agent_old_reward
variant:
  environment_profile: sp_tracking
  reference_profile: sp_tracking
  observation_profile: sp_tracking
  reward_profile: old_tracking
  termination_profile: sp_tracking
  curriculum_profile: sp_tracking
  sampling_profile: sp_tracking
  agent_profile: bfm_ppo

agent_overrides:
  obs_groups:
    actor: [policy]
    critic: [policy, priv, priv_critic]

# SP observations retain their own named bodies, while the active old reward
# selects the BFM view from this shared reference cache.
robot:
  body_names: ${task.reference_views.combined.body_names}
